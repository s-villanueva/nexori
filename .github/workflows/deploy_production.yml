name: Deploy Production

on:
  workflow_dispatch:
  # Uncomment the lines below to also deploy automatically on push to main:
  # push:
  #   branches: [main]

jobs:
  deploy:
    name: Build & deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 74.163.80.99 >> ~/.ssh/known_hosts

      - name: Upload frontend build
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            azureadmin@74.163.80.99:/home/azureadmin/Frontend-B2B/dist/