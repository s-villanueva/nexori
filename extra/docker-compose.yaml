services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: b2b_proyecto
      POSTGRES_USER: "owner"
      POSTGRES_PASSWORD: "123456"
    volumes:
      - pg_data:/var/lib/postgresql
      - ./resources/db_schema.sql:/docker-entrypoint-initdb.d/db_schema.sql
      - ./resources/quartz.sql:/docker-entrypoint-initdb.d/quartz.sql
    container_name: b2b_database
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owner -d b2b_proyecto"]
      interval: 5s
      timeout: 5s
      retries: 10

  spring-app:
    build: .
    depends_on:
      - db
    image: b2b-spring-app
    container_name: b2b-spring
    ports:
     - "8080:8080"
    env_file:
      - ./resources/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/b2b_proyecto
      SPRING_DATASOURCE_USERNAME: owner
      SPRING_DATASOURCE_PASSWORD: 123456
volumes:
  pg_data:
